<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido | Círculo Verde</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg,#1a3d1a 0%,#2f6b2f 50%,#4a9e4a 100%);
            display: flex; flex-direction: column;
            font-family: "Segoe UI", sans-serif;
        }
        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            text-align: center;
            animation: fadeUp .7s ease-out;
            max-width: 480px;
            width: 100%;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .logo-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 4px solid #2f6b2f;
            object-fit: cover;
            margin-bottom: 1.2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,.15);
        }
        .app-title { color:#1f5c1f; font-weight:800; font-size:2rem; margin-bottom:.3rem; }
        .app-sub   { color:#666; margin-bottom:2rem; }
        .btn-main {
            background: linear-gradient(135deg,#2f6b2f,#4a9e4a);
            color: white; border:none; border-radius:25px;
            padding:.75rem 2rem; font-size:1rem; font-weight:600;
            transition:.2s; text-decoration:none; display:inline-block;
        }
        .btn-main:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(47,107,47,.4); color:white; }
        .btn-sec {
            border:2px solid #2f6b2f; color:#2f6b2f; border-radius:25px;
            padding:.75rem 2rem; font-size:1rem; font-weight:600;
            transition:.2s; text-decoration:none; display:inline-block;
        }
        .btn-sec:hover { background:#2f6b2f; color:white; }
        .feature { background:#f0f9f0; border-radius:10px; padding:.8rem 1rem; margin:.4rem 0; font-size:.9rem; color:#444; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4">

<div class="welcome-card">
    <img th:src="@{/img/LogoCirculoVerde.jpeg}" alt="Logo Círculo Verde" class="logo-circle">
    <div class="app-title">Círculo Verde</div>
    <p class="app-sub">Tu huerto urbano inteligente 🌱</p>

    <div class="mb-4">
        <div class="feature"> Calendario de siembras por zona climática</div>
        <div class="feature"> Gestión de inventario del huerto</div>
        <div class="feature"> Clima y recomendaciones en tiempo real</div>
        <div class="feature"> Diario de seguimiento de tu huerto</div>
    </div>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="/login"    class="btn-main">Entrar</a>
        <a href="/registro" class="btn-sec">Crear cuenta</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
