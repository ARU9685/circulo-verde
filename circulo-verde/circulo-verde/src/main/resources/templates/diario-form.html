<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva entrada | Círculo Verde</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#eef4ee; font-family:"Segoe UI",sans-serif; }
        .navbar { background:linear-gradient(90deg,#1a3d1a,#2f6b2f) !important; }
        .navbar .navbar-brand,.navbar .nav-link { color:#fff !important; }
        .form-card { background:white; border-radius:14px; padding:2rem; box-shadow:0 2px 12px rgba(0,0,0,.07); max-width:620px; margin:0 auto; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm mb-4" style="background:linear-gradient(90deg,#1a3d1a,#2f6b2f);">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/panel">
            <img th:src="@{/img/LogoCirculoVerde.jpeg}" alt="Logo" style="height:38px;border-radius:50%;border:2px solid #a8d5a2;">
            <span class="text-white">Círculo Verde</span>
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="/diario">📓 Diario</a></li>
            </ul>
            <a href="/logout" class="btn btn-sm fw-semibold text-white"
               style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:6px 18px;">Salir →</a>
        </div>
    </div>
</nav>

<div class="container py-2">
    <div class="form-card">
        <h4 class="fw-bold mb-4" style="color:#1f5c1f;">📓 Nueva entrada del diario</h4>

        <form th:action="@{/diario/guardar}" th:object="${entrada}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Fecha</label>
                <input type="date" class="form-control" th:field="*{fecha}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Título</label>
                <input type="text" class="form-control" th:field="*{titulo}"
                       placeholder="Ej: Primeras flores en los tomates" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">¿Qué ha pasado hoy?</label>
                <textarea class="form-control" th:field="*{contenido}" rows="6"
                          placeholder="Describe lo que has observado, hecho o aprendido..." required></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1 py-2">Guardar entrada</button>
                <a href="/diario" class="btn btn-outline-secondary flex-grow-1">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
