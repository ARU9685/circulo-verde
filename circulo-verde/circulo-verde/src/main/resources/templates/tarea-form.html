<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tarea | Círculo Verde</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html { scroll-padding-top: 70px; }
        body { background-color: #f2e7d5; }
        .navbar { background-color: #2f5d2f !important; }
        .navbar .navbar-brand, .navbar .nav-link { color: #fff !important; font-weight: 500; }
        .form-card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 0 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<!-- NAVBAR STICKY UNIFICADO -->
<nav class="navbar navbar-expand-lg shadow-sm sticky-navbar" style="background:linear-gradient(90deg,#1a3d1a,#2f6b2f);position:sticky;top:0;z-index:1030;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/panel">
            <img th:src="@{/img/LogoCirculoVerde.jpeg}" alt="Logo"
                 style="height:38px;border-radius:50%;border:2px solid #a8d5a2;">
            <span class="text-white" style="letter-spacing:.5px;">Círculo Verde</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="/panel">Mi huerto</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-white fw-medium" href="#" data-bs-toggle="dropdown">Gestión</a>
                    <ul class="dropdown-menu border-0 shadow-sm" style="border-radius:10px;">
                        <li><a class="dropdown-item py-2" href="/calendario">Calendario</a></li>
                        <li><a class="dropdown-item py-2" href="/inventario">Inventario</a></li>
                        <li><a class="dropdown-item py-2" href="/diario">Diario</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2" href="/estadisticas">Estadísticas</a></li>
                    </ul>
                </li>
            </ul>
            <!-- Buscador -->
            <form class="d-flex me-3" id="navSearchForm" onsubmit="buscarEnApp(event)">
                <div class="input-group input-group-sm" style="width:220px;">
                    <input type="text" id="navSearch" class="form-control border-0"
                           placeholder="Buscar cultivo, tarea..."
                           style="border-radius:20px 0 0 20px;background:rgba(255,255,255,.15);color:white;font-size:.85rem;"
                           autocomplete="off">
                    <button class="btn border-0" type="submit"
                            style="border-radius:0 20px 20px 0;background:rgba(255,255,255,.2);color:white;">
                        🔍
                    </button>
                </div>
                <!-- Resultados de búsqueda -->
                <div id="searchResults"
                     style="display:none;position:absolute;top:58px;right:80px;width:280px;
                            background:white;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);
                            z-index:2000;max-height:320px;overflow-y:auto;"></div>
            </form>
            <a href="/logout" class="btn btn-sm fw-semibold text-white"
               style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:6px 18px;">
                Salir →
            </a>
        </div>
    </div>
</nav>
<script>
    const CULTIVOS_BUSQUEDA = [
      {n:"Tomate",url:"/calendario",desc:"Siembra feb-mar · Cosecha jun-oct"},
      {n:"Pimiento",url:"/calendario",desc:"Siembra ene-feb · Cosecha jul-nov"},
      {n:"Lechuga",url:"/calendario",desc:"Siembra ago-oct · Cosecha nov-mar"},
      {n:"Calabacín",url:"/calendario",desc:"Siembra mar-abr · Cosecha jun-oct"},
      {n:"Pepino",url:"/calendario",desc:"Siembra feb-mar · Cosecha jun-sep"},
      {n:"Berenjena",url:"/calendario",desc:"Siembra ene-feb · Cosecha jun-nov"},
      {n:"Zanahoria",url:"/calendario",desc:"Siembra feb-abr · Cosecha jun-sep"},
      {n:"Cebolla",url:"/calendario",desc:"Siembra ago-sep · Cosecha may-jun"},
      {n:"Ajo",url:"/calendario",desc:"Plantación oct-nov · Cosecha may-jun"},
      {n:"Patata",url:"/calendario",desc:"Plantación mar-abr · Cosecha jul-ago"},
      {n:"Judía verde",url:"/calendario",desc:"Siembra mar-may · Cosecha may-jul"},
      {n:"Brócoli",url:"/calendario",desc:"Semillero jul-ago · Cosecha nov-mar"},
      {n:"Coliflor",url:"/calendario",desc:"Semillero jul-ago · Cosecha dic-mar"},
      {n:"Espárrago",url:"/calendario",desc:"Plantación mar-abr · Cosecha mar-may"},
      {n:"Alcachofa",url:"/calendario",desc:"Plantación ago-sep · Cosecha nov-abr"},
      {n:"Sandía",url:"/calendario",desc:"Siembra feb-mar · Cosecha jul-sep"},
      {n:"Melón",url:"/calendario",desc:"Siembra feb-mar · Cosecha jul-sep"},
      {n:"Acelga",url:"/calendario",desc:"Siembra feb/ago · Cosecha todo el año"},
      {n:"Espinaca",url:"/calendario",desc:"Siembra ago-sep · Cosecha oct-abr"},
      {n:"Puerro",url:"/calendario",desc:"Semillero ene-feb · Cosecha oct-mar"},
      {n:"Col",url:"/calendario",desc:"Semillero jul-ago · Cosecha nov-feb"},
      {n:"Rábano",url:"/calendario",desc:"Siembra directa · Listo en 30 días"},
      {n:"Remolacha",url:"/calendario",desc:"Siembra mar-may · Cosecha jul-sep"},
      {n:"Inventario",url:"/inventario",desc:"Ver tus productos y suministros"},
      {n:"Diario",url:"/diario",desc:"Entradas de tu diario del huerto"},
      {n:"Estadísticas",url:"/estadisticas",desc:"Resumen de actividad"},
      {n:"Calendario",url:"/calendario",desc:"Tareas y cultivos del mes"},
    ];
    function buscarEnApp(e) {
        e.preventDefault();
        const q = document.getElementById("navSearch").value.trim().toLowerCase();
        if (!q) return;
        const res = CULTIVOS_BUSQUEDA.filter(c => c.n.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q));
        const box = document.getElementById("searchResults");
        if (!res.length) {
            box.innerHTML = '<div style="padding:12px 16px;color:#888;font-size:.85rem;">Sin resultados para \"' + q + '\"</div>';
        } else {
            box.innerHTML = res.map(r =>
                '<a href="' + r.url + '" style="display:block;padding:10px 16px;text-decoration:none;color:#1f5c1f;border-bottom:0.5px solid #e8f0e8;font-size:.88rem;">' +
                '<strong>' + r.n + '</strong><br><span style="color:#888;font-size:.78rem;">' + r.desc + '</span></a>'
            ).join('');
        }
        box.style.display = 'block';
    }
    document.addEventListener("click", function(e) {
        const box = document.getElementById("searchResults");
        if (box && !box.contains(e.target) && e.target.id !== "navSearch") {
            box.style.display = "none";
        }
    });
    document.getElementById("navSearch")?.addEventListener("input", function() {
        if (this.value.length > 1) buscarEnApp({preventDefault:()=>{}});
        else document.getElementById("searchResults").style.display = "none";
    });
</script>

<div class="container" style="max-width: 500px;">
    <div class="form-card">
        <h4 class="fw-bold text-success mb-4">
            <span th:if="${tarea.id != null}">✏️ Editar tarea</span>
            <span th:if="${tarea.id == null}">➕ Nueva tarea</span>
        </h4>

        <form th:action="@{/tarea-guardar}" th:object="${tarea}" method="post">
            <!-- Si editamos, incluimos el id oculto -->
            <input type="hidden" th:if="${tarea.id != null}" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label fw-semibold">Fecha</label>
                <input type="date" class="form-control" th:field="*{fecha}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Título</label>
                <input type="text" class="form-control" th:field="*{titulo}"
                       placeholder="Ej: Regar los tomates" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Tipo</label>
                <select class="form-select" th:field="*{tipo}">
                    <option value="riego">💧 Riego</option>
                    <option value="siembra">🌱 Siembra</option>
                    <option value="abonado">🧪 Abonado</option>
                    <option value="mantenimiento">🔧 Mantenimiento</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1">Guardar</button>
                <a href="/calendario" class="btn btn-outline-secondary flex-grow-1">Cancelar</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
