<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tarea | Círculo Verde</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html { scroll-padding-top: 70px; }
        body { background:#eef4ee; font-family:"Segoe UI",sans-serif; }
        .navbar { background:linear-gradient(90deg,#1a3d1a,#2f6b2f) !important; }
        .navbar .navbar-brand,.navbar .nav-link { color:#fff !important; }
        .form-card {
            background:white; border-radius:14px; padding:2rem 2.2rem;
            box-shadow:0 2px 12px rgba(0,0,0,.08); max-width:480px; margin:0 auto;
        }
        .form-label { font-weight:600; font-size:.9rem; color:#333; }
        .form-control, .form-select {
            border-radius:10px; border:1.5px solid #d0e8d0; padding:.65rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color:#2f6b2f; box-shadow:0 0 0 3px rgba(47,107,47,.12);
        }
        /* Icono de color según tipo seleccionado */
        .tipo-preview { text-align:center; font-size:2rem; margin:8px 0 4px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm" style="background:linear-gradient(90deg,#1a3d1a,#2f6b2f);position:sticky;top:0;z-index:1030;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/panel">
            <img th:src="@{/img/LogoCirculoVerde.jpeg}" alt="Logo"
                 style="height:38px;border-radius:50%;border:2px solid #a8d5a2;">
            <span class="text-white">Círculo Verde</span>
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="/calendario">Calendario</a></li>
            </ul>
            <a href="/logout" class="btn btn-sm fw-semibold text-white"
               style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:6px 18px;">
                Salir →</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="form-card">

        <h4 class="fw-bold mb-4" style="color:#1f5c1f;">
            <span th:if="${tarea.id != null}">✏️ Editar tarea</span>
            <span th:if="${tarea.id == null}">➕ Nueva tarea</span>
        </h4>

        <form th:action="@{/tarea-guardar}" th:object="${tarea}" method="post">
            <input type="hidden" th:if="${tarea.id != null}" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" th:field="*{fecha}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" th:field="*{titulo}"
                       placeholder="Ej: Regar los tomates" required
                       maxlength="80">
            </div>

            <div class="mb-4">
                <label class="form-label">Tipo</label>
                <div class="tipo-preview" id="tipoIcono">💧</div>
                <select class="form-select" th:field="*{tipo}" id="tipoSelect"
                        onchange="actualizarIcono(this.value)">
                    <option value="riego"> Riego</option>
                    <option value="siembra"> Siembra</option>
                    <option value="abonado"> Abonado</option>
                    <option value="mantenimiento"> Mantenimiento</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1 py-2 fw-semibold">
                    Guardar tarea
                </button>
                <a href="/calendario" class="btn btn-outline-secondary flex-grow-1 py-2">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const iconos = { riego:'💧', siembra:'🌱', abonado:'🧪', mantenimiento:'🔧' };
    function actualizarIcono(val) {
        document.getElementById('tipoIcono').textContent = iconos[val] || '📋';
    }
    // Inicializar con el valor actual al cargar (útil al editar)
    window.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('tipoSelect');
        if (sel) actualizarIcono(sel.value);
    });
</script>
</body>
</html>
