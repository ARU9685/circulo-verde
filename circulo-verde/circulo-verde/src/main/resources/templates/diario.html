<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Diario | Círculo Verde</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#eef4ee; font-family:"Segoe UI",sans-serif; }
    .navbar { background:linear-gradient(90deg,#1a3d1a,#2f6b2f) !important; }
    .navbar .navbar-brand,.navbar .nav-link { color:#fff !important; }
    .cv-card { background:white; border-radius:14px; padding:1.5rem; box-shadow:0 2px 12px rgba(0,0,0,.07); }
    .entry-card {
        background:#fff;
        border-left:4px solid #2f6b2f;
        border-radius:10px;
        padding:1.2rem 1.5rem;
        margin-bottom:1rem;
        box-shadow:0 1px 6px rgba(0,0,0,.06);
        transition:transform .15s;
    }
    .entry-card:hover { transform:translateX(4px); }
    .entry-date { font-size:.82rem; color:#888; font-weight:500; }
    .entry-title { font-weight:700; color:#1f5c1f; margin:.3rem 0; }
    .entry-content { color:#444; font-size:.94rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm" style="background:linear-gradient(90deg,#1a3d1a,#2f6b2f);">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/panel">
      <img th:src="@{/img/LogoCirculoVerde.jpeg}" alt="Logo" style="height:38px;border-radius:50%;border:2px solid #a8d5a2;">
      <span class="text-white">Círculo Verde</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto ms-3">
        <li class="nav-item"><a class="nav-link text-white fw-medium" href="/panel">🏡 Mi huerto</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-white fw-medium" href="#" data-bs-toggle="dropdown">🌿 Gestión</a>
          <ul class="dropdown-menu border-0 shadow-sm" style="border-radius:10px;">
            <li><a class="dropdown-item py-2" href="/calendario"> Calendario</a></li>
            <li><a class="dropdown-item py-2" href="/inventario"> Inventario</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item py-2" href="/estadisticas"> Estadísticas</a></li>
          </ul>
        </li>
      </ul>
      <a href="/logout" class="btn btn-sm fw-semibold text-white"
         style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:6px 18px;">Salir →</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="cv-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h2 class="fw-bold mb-0" style="color:#1f5c1f;">📓 Diario del huerto</h2>
        <p class="text-muted mb-0">Registra tus avances y observaciones</p>
      </div>
      <a href="/diario/nueva" class="btn btn-success px-4">+ Nueva entrada</a>
    </div>

    <div th:if="${entradas.isEmpty()}" class="text-center py-5 text-muted">
      <p class="fs-5">Aún no tienes entradas en el diario.</p>
      <a href="/diario/nueva" class="btn btn-success">Escribe la primera</a>
    </div>

    <div th:each="e : ${entradas}" class="entry-card">
      <div class="entry-date" th:text="${e.fecha}"></div>
      <div class="entry-title" th:text="${e.titulo}"></div>
      <div class="entry-content" th:text="${e.contenido}"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
