<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario | Círculo Verde</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f2e7d5; }
        .navbar { background-color: #2f5d2f !important; }
        .navbar .navbar-brand, .navbar .nav-link { color: #fff !important; font-weight: 500; }
        .navbar .nav-link:hover { color: #c8f7c5 !important; }
        .inventory-container { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/panel">🌿 Círculo Verde</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCV">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navCV">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/panel">Mi huerto</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Gestión</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/calendario"> Calendario</a></li>
                        <li><a class="dropdown-item" href="/diario"> Diario</a></li>
                        <li><a class="dropdown-item py-2" href="/estadisticas"> Estadísticas</a></li>
                    </ul>
                </li>
            </ul>



        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="inventory-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0" style="color:#2f5d2f;">📦 Inventario del huerto</h2>
                <p class="text-muted mb-0">Gestiona tus semillas, herramientas y suministros</p>
            </div>
            <a href="/inventario/nuevo" class="btn btn-success">+ Añadir producto</a>
        </div>

        <!-- Tabla -->
        <div th:if="${!productos.isEmpty()}" class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th class="text-center">Cantidad</th>
                    <th class="text-center">Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.nombre}" class="fw-semibold"></td>
                    <td>
                        <span th:text="${p.categoria}"
                              class="badge bg-secondary text-capitalize"></span>
                    </td>
                    <td class="text-center fw-bold" th:text="${p.cantidad}"></td>
                    <td class="text-center">
                        <span th:class="${p.estado == 'disponible' ? 'badge bg-success' :
                                         p.estado == 'bajo'        ? 'badge bg-warning text-dark' :
                                                                     'badge bg-danger'}"
                              th:text="${p.estado}"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/inventario/editar/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">✏️</a>
                        <a th:href="@{/inventario/eliminar/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('¿Eliminar este producto?')">🗑️</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${productos.isEmpty()}" class="text-center py-5 text-muted">
            <p class="fs-5">No tienes productos en el inventario todavía.</p>
            <a href="/inventario/nuevo" class="btn btn-success">Añadir el primero</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
